<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title> DOM Explorer Task Manager</title>
</head>
<body data-theme="light">
    <main class="app">
        <header class="header">
            <div class="logo">
                <h1>TaskManager</h1>
                <p>Stay organized, Get things done</p>
            </div>
            <button id="themeBtn">🌙</button>
        </header>
        <section class="stats-container">
            <div class="stat-card">
                <h3>All Tasks</h3>
                <p id="totalTasks">0</p>
            </div>
            <div class="stat-card">
                <h3>Completed</h3>
                <p id="completedTasks">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <p id="pendingTasks">0</p>
            </div>
            <div class="stat-card">
                <h3>Deleted</h3>
                <p id="deletedTasks">0</p>
            </div>
        </section>
        <section class="dashboard">
            <div class="tasks-panel">
                <div class="section-header">
                    <h2>My Tasks</h2>
                    <button id="Create">+ Add Task</button>
                </div>
                <div class="form">
                    <div></div>
                    <div class="top">
                        <div></div>
                        <h1 id="close">X</h1>
                    </div>
                    <form>
                        <h1>Create task</h1>
                        <input type="text" placeholder="Title"/>
                        <input type="text" placeholder="Category"/>
                        <input type="text" placeholder="Description"/>
                        <button>Create</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
